<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chatbot Agent 对话系统压力测试</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    h1 {
      text-align: center;
      color: white;
      margin-bottom: 30px;
      font-size: 2rem;
      text-shadow: 0 2px 4px rgba(0,0,0,0.2);
    }

    .dashboard {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }

    .stat-card {
      background: white;
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.1);
      text-align: center;
      transition: transform 0.3s ease;
    }

    .stat-card:hover {
      transform: translateY(-5px);
    }

    .stat-card .icon {
      font-size: 2.5rem;
      margin-bottom: 10px;
    }

    .stat-card .value {
      font-size: 2.5rem;
      font-weight: bold;
      color: #333;
    }

    .stat-card .label {
      color: #666;
      margin-top: 5px;
      font-size: 0.95rem;
    }

    .stat-card.pass .value { color: #22c55e; }
    .stat-card.fail .value { color: #ef4444; }
    .stat-card.time .value { color: #3b82f6; }

    .control-panel {
      background: white;
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 20px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.1);
    }

    .control-panel h2 {
      margin-bottom: 16px;
      color: #333;
    }

    .btn-group {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    button {
      padding: 12px 24px;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.3s ease;
      font-weight: 600;
    }

    .btn-primary {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
    }

    .btn-secondary {
      background: #f3f4f6;
      color: #374151;
    }

    .btn-secondary:hover {
      background: #e5e7eb;
    }

    .results-panel {
      background: white;
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.1);
    }

    .results-panel h2 {
      margin-bottom: 16px;
      color: #333;
    }

    .test-category {
      margin-bottom: 20px;
    }

    .test-category h3 {
      color: #555;
      margin-bottom: 10px;
      padding-bottom: 8px;
      border-bottom: 2px solid #e5e7eb;
    }

    .test-item {
      display: flex;
      align-items: center;
      padding: 10px 14px;
      margin: 6px 0;
      border-radius: 8px;
      transition: background 0.2s;
    }

    .test-item:hover {
      background: #f9fafb;
    }

    .test-item .status {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-right: 12px;
      font-size: 0.8rem;
    }

    .test-item.pass .status {
      background: #dcfce7;
      color: #16a34a;
    }

    .test-item.fail .status {
      background: #fee2e2;
      color: #dc2626;
    }

    .test-item .name {
      flex: 1;
      color: #374151;
    }

    .test-item .duration {
      color: #6b7280;
      font-size: 0.85rem;
      font-family: monospace;
    }

    .test-item .error {
      width: 100%;
      margin-top: 8px;
      padding: 8px 12px;
      background: #fef2f2;
      border-left: 3px solid #ef4444;
      border-radius: 4px;
      color: #991b1b;
      font-size: 0.85rem;
    }

    .progress-bar {
      width: 100%;
      height: 8px;
      background: #e5e7eb;
      border-radius: 4px;
      overflow: hidden;
      margin: 20px 0;
    }

    .progress-bar .fill {
      height: 100%;
      background: linear-gradient(90deg, #22c55e, #16a34a);
      border-radius: 4px;
      transition: width 0.5s ease;
    }

    .log-output {
      background: #1f2937;
      color: #e5e7eb;
      padding: 16px;
      border-radius: 8px;
      font-family: 'Courier New', monospace;
      font-size: 0.85rem;
      max-height: 400px;
      overflow-y: auto;
      margin-top: 16px;
    }

    .log-output .log-info { color: #60a5fa; }
    .log-output .log-success { color: #4ade80; }
    .log-output .log-error { color: #f87171; }
    .log-output .log-warn { color: #fbbf24; }

    .scenario-simulator {
      background: white;
      border-radius: 16px;
      padding: 24px;
      margin-top: 20px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.1);
    }

    .scenario-simulator h2 {
      margin-bottom: 16px;
      color: #333;
    }

    .scenario-tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    .scenario-tab {
      padding: 8px 16px;
      border: 2px solid #e5e7eb;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.3s;
      background: white;
    }

    .scenario-tab.active {
      border-color: #667eea;
      background: #f5f3ff;
      color: #667eea;
    }

    .scenario-content {
      padding: 16px;
      background: #f9fafb;
      border-radius: 8px;
      min-height: 200px;
    }

    .chat-bubble {
      max-width: 80%;
      padding: 12px 16px;
      border-radius: 16px;
      margin: 8px 0;
      word-wrap: break-word;
    }

    .chat-bubble.bot {
      background: #f3f4f6;
      color: #374151;
      margin-right: auto;
      border-bottom-left-radius: 4px;
    }

    .chat-bubble.user {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      margin-left: auto;
      border-bottom-right-radius: 4px;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .running {
      animation: pulse 1.5s infinite;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🧪 Chatbot Agent 对话系统压力测试</h1>

    <div class="dashboard">
      <div class="stat-card pass">
        <div class="icon">✅</div>
        <div class="value" id="passCount">0</div>
        <div class="label">通过测试</div>
      </div>
      <div class="stat-card fail">
        <div class="icon">❌</div>
        <div class="value" id="failCount">0</div>
        <div class="label">失败测试</div>
      </div>
      <div class="stat-card time">
        <div class="icon">⏱️</div>
        <div class="value" id="totalTime">0ms</div>
        <div class="label">总耗时</div>
      </div>
      <div class="stat-card">
        <div class="icon">📝</div>
        <div class="value" id="totalTests">0</div>
        <div class="label">测试总数</div>
      </div>
    </div>

    <div class="control-panel">
      <h2>🎮 测试控制台</h2>
      <div class="btn-group">
        <button class="btn-primary" onclick="runAllTests()">运行全部测试</button>
        <button class="btn-secondary" onclick="runRiskTests()">风险评分测试</button>
        <button class="btn-secondary" onclick="runFlowTests()">流程完整性测试</button>
        <button class="btn-secondary" onclick="runPromptTests()">提示词测试</button>
        <button class="btn-secondary" onclick="runPerformanceTests()">性能基准测试</button>
        <button class="btn-secondary" onclick="clearResults()">清除结果</button>
      </div>
      <div class="progress-bar">
        <div class="fill" id="progressBar" style="width: 0%"></div>
      </div>
    </div>

    <div class="results-panel">
      <h2>📊 测试结果</h2>
      <div id="testResults"></div>
    </div>

    <div class="log-output" id="logOutput">
      <div class="log-info">等待测试开始...</div>
    </div>

    <div class="scenario-simulator">
      <h2>🎭 对话场景模拟器</h2>
      <div class="scenario-tabs">
        <div class="scenario-tab active" onclick="switchScenario('newUser')">新用户筛查</div>
        <div class="scenario-tab" onclick="switchScenario('returning')">老用户复查</div>
        <div class="scenario-tab" onclick="switchScenario('highRisk')">高风险处理</div>
        <div class="scenario-tab" onclick="switchScenario('scale')">量表下发</div>
      </div>
      <div class="scenario-content" id="scenarioContent">
        <div id="chatContainer"></div>
      </div>
    </div>
  </div>

  <script type="module">
    // 内联测试逻辑（不依赖外部模块）
    import { CHATBOT_FLOW } from '../constants/flow.js';
    import { BRANCH_FLOWS } from '../constants/branches.js';
    import { calculateRiskScore } from '../utils/riskCalculator.js';
    import { buildSystemPrompt } from '../prompts/systemPrompt.js';
    import { buildWelcomeMessage } from '../prompts/index.js';

    let currentResults = [];

    function log(message, type = 'info') {
      const output = document.getElementById('logOutput');
      const div = document.createElement('div');
      div.className = `log-${type}`;
      div.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
      output.appendChild(div);
      output.scrollTop = output.scrollHeight;
    }

    function updateStats() {
      const passed = currentResults.filter(r => r.passed).length;
      const failed = currentResults.filter(r => !r.passed).length;
      document.getElementById('passCount').textContent = passed;
      document.getElementById('failCount').textContent = failed;
      document.getElementById('totalTests').textContent = currentResults.length;
    }

    function updateProgress(current, total) {
      const pct = (current / total) * 100;
      document.getElementById('progressBar').style.width = `${pct}%`;
    }

    function addResult(name, passed, duration, error = null) {
      const container = document.getElementById('testResults');
      const div = document.createElement('div');
      div.className = `test-item ${passed ? 'pass' : 'fail'}`;
      div.innerHTML = `
        <div class="status">${passed ? '✓' : '✗'}</div>
        <div class="name">${name}</div>
        <div class="duration">${duration.toFixed(2)}ms</div>
        ${error ? `<div class="error">${error}</div>` : ''}
      `;
      container.appendChild(div);
    }

    async function runTest(name, fn) {
      const start = performance.now();
      try {
        await fn();
        const duration = performance.now() - start;
        currentResults.push({ name, passed: true, duration });
        addResult(name, true, duration);
        log(`✅ ${name}`, 'success');
      } catch (error) {
        const duration = performance.now() - start;
        currentResults.push({ name, passed: false, duration, error: error.message });
        addResult(name, false, duration, error.message);
        log(`❌ ${name}: ${error.message}`, 'error');
      }
      updateStats();
    }

    // 测试套件
    window.runAllTests = async function() {
      clearResults();
      const start = performance.now();
      log('🚀 开始执行全部压力测试...');

      const tests = [
        // 风险评分测试
        ['最高风险评分计算', () => {
          const result = calculateRiskScore({
            gender: '女', age: 13, growth_spurt: '长得挺快',
            family_scoliosis: '有', back_pain: '经常疼', pain_level: 8,
            posture_shoulders: '右肩高', posture_scapula: '一侧更突出',
            posture_waist: '一侧更深', adams_result: '明显隆起'
          });
          if (result.total <= 100) throw new Error(`期望高分，得到 ${result.total}`);
          if (result.level !== 'high') throw new Error(`期望high，得到 ${result.level}`);
        }],
        ['最低风险评分计算', () => {
          const result = calculateRiskScore({
            gender: '男', age: 8, growth_spurt: '基本没长',
            family_scoliosis: '没有', back_pain: '从不疼',
            posture_shoulders: '一样高', posture_scapula: '对称',
            posture_waist: '对称', adams_result: '对称无隆起'
          });
          if (result.total > 20) throw new Error(`期望低分，得到 ${result.total}`);
          if (result.level !== 'low') throw new Error(`期望low，得到 ${result.level}`);
        }],
        ['缺失答案回退', () => {
          const result = calculateRiskScore({});
          if (!result.level) throw new Error('应有默认等级');
        }],
        ['疼痛跳过逻辑', () => {
          const result = calculateRiskScore({ back_pain: '从不疼', pain_level: 9 });
          if (result.factors.backPain !== 0) throw new Error('从不疼时背痛应为0');
          if (result.factors.painSeverity !== 0) throw new Error('从不疼时疼痛严重度应为0');
        }],

        // 流程测试
        ['CHATBOT_FLOW完整性', () => {
          const requiredIds = ['greeting', 'name', 'gender', 'age', 'results', 'done'];
          const flowIds = CHATBOT_FLOW.map(s => s.id);
          for (const id of requiredIds) {
            if (!flowIds.includes(id)) throw new Error(`缺少步骤: ${id}`);
          }
        }],
        ['分支流程定义', () => {
          const branches = ['main', 'reassess', 'report', 'rehab', 'followup'];
          for (const b of branches) {
            if (!BRANCH_FLOWS[b] || BRANCH_FLOWS[b].length === 0) {
              throw new Error(`分支 ${b} 未定义`);
            }
          }
        }],

        // 提示词测试
        ['系统提示词生成', () => {
          const ctx = {
            patientName: '测试', patientAge: 10, patientGender: '男',
            phase: 'greeting', stepIndex: 0, totalSteps: 5,
            hasHistory: false, hasDueReminder: false,
            availableTools: ['vision3'], currentDate: '2026-05-29'
          };
          const prompt = buildSystemPrompt(ctx);
          if (prompt.length < 1000) throw new Error('提示词太短');
          if (!prompt.includes('小柱')) throw new Error('缺少角色名');
        }],
        ['高危患者增强警告', () => {
          const ctx = {
            patientName: '测试', patientAge: 13, patientGender: '女',
            phase: 'screening', stepIndex: 0, totalSteps: 5,
            hasHistory: false, hasDueReminder: false,
            availableTools: [], currentDate: '2026-05-29',
            answers: { growth_spurt: '长得挺快', family_scoliosis: '有' }
          };
          const prompt = buildSystemPrompt(ctx);
          if (!prompt.includes('高危')) throw new Error('缺少高危警告');
        }],

        // 欢迎消息测试
        ['欢迎消息生成', () => {
          const msgs = buildWelcomeMessage({ patientName: '小明', hasHistory: false, hasDueReminder: false });
          if (msgs.length < 2) throw new Error('欢迎消息太少');
        }],

        // 性能测试
        ['风险评分1000次性能', () => {
          const answers = { gender: '女', age: 13, family_scoliosis: '有', back_pain: '经常疼' };
          const start = performance.now();
          for (let i = 0; i < 1000; i++) calculateRiskScore(answers);
          const duration = performance.now() - start;
          if (duration > 1000) throw new Error(`太慢: ${duration.toFixed(2)}ms`);
          log(`   1000次计算: ${duration.toFixed(2)}ms`, 'info');
        }],
        ['提示词生成100次性能', () => {
          const ctx = {
            patientName: '测试', patientAge: 12, patientGender: '女',
            phase: 'screening', stepIndex: 3, totalSteps: 12,
            hasHistory: true, hasDueReminder: true,
            availableTools: ['vision3', 'rom', 'scales', 'adams_camera', 'psych'],
            currentDate: '2026-05-29'
          };
          const start = performance.now();
          for (let i = 0; i < 100; i++) buildSystemPrompt(ctx);
          const duration = performance.now() - start;
          if (duration > 2000) throw new Error(`太慢: ${duration.toFixed(2)}ms`);
          log(`   100次生成: ${duration.toFixed(2)}ms`, 'info');
        }],

        // 边界测试
        ['极端年龄值', () => {
          calculateRiskScore({ age: 3 });
          calculateRiskScore({ age: 99 });
          calculateRiskScore({ age: -5 });
        }],
        ['超大疼痛值', () => {
          const result = calculateRiskScore({ pain_level: 999 });
          if (result.factors.painSeverity !== 25) throw new Error('超大值应封顶');
        }],
        ['空字符串答案', () => {
          calculateRiskScore({ family_scoliosis: '', back_pain: '' });
        }],
      ];

      for (let i = 0; i < tests.length; i++) {
        await runTest(tests[i][0], tests[i][1]);
        updateProgress(i + 1, tests.length);
      }

      const totalDuration = performance.now() - start;
      document.getElementById('totalTime').textContent = `${totalDuration.toFixed(0)}ms`;
      log(`🏁 全部测试完成！总耗时: ${totalDuration.toFixed(2)}ms`, 'success');
    };

    window.runRiskTests = async function() {
      clearResults();
      log('🎯 运行风险评分专项测试...');
      const tests = [
        ['最高风险', () => {
          const r = calculateRiskScore({ gender: '女', age: 13, growth_spurt: '长得挺快', family_scoliosis: '有', back_pain: '经常疼', pain_level: 8, posture_shoulders: '右肩高', posture_scapula: '一侧更突出', posture_waist: '一侧更深', adams_result: '明显隆起' });
          if (r.level !== 'high') throw new Error('应为高风险');
        }],
        ['最低风险', () => {
          const r = calculateRiskScore({ gender: '男', age: 8, growth_spurt: '基本没长', family_scoliosis: '没有', back_pain: '从不疼', posture_shoulders: '一样高', posture_scapula: '对称', posture_waist: '对称', adams_result: '对称无隆起' });
          if (r.level !== 'low') throw new Error('应为低风险');
        }],
        ['中等风险', () => {
          const r = calculateRiskScore({ age: 12, family_scoliosis: '没有', back_pain: '偶尔会疼', posture_shoulders: '右肩高', posture_scapula: '对称', posture_waist: '对称' });
          if (!['mild', 'moderate'].includes(r.level)) throw new Error(`期望中低风险，得到 ${r.level}`);
        }],
      ];
      for (let i = 0; i < tests.length; i++) {
        await runTest(tests[i][0], tests[i][1]);
      }
    };

    window.runFlowTests = async function() {
      clearResults();
      log('🌊 运行流程完整性测试...');
      const tests = [
        ['步骤ID完整性', () => {
          const ids = CHATBOT_FLOW.map(s => s.id);
          ['greeting', 'name', 'gender', 'age', 'results'].forEach(id => {
            if (!ids.includes(id)) throw new Error(`缺少: ${id}`);
          });
        }],
        ['分支定义检查', () => {
          ['main', 'reassess', 'report', 'rehab', 'followup'].forEach(b => {
            if (!BRANCH_FLOWS[b]) throw new Error(`未定义: ${b}`);
          });
        }],
      ];
      for (const [name, fn] of tests) await runTest(name, fn);
    };

    window.runPromptTests = async function() {
      clearResults();
      log('💬 运行提示词测试...');
      const tests = [
        ['基础提示词', () => {
          const ctx = { patientName: '测试', patientAge: 10, patientGender: '男', phase: 'greeting', stepIndex: 0, totalSteps: 5, hasHistory: false, hasDueReminder: false, availableTools: ['vision3'], currentDate: '2026-05-29' };
          const p = buildSystemPrompt(ctx);
          if (p.length < 500) throw new Error('提示词太短');
        }],
        ['量表上下文', () => {
          const ctx = { patientName: '测试', patientAge: 12, patientGender: '女', phase: 'greeting', stepIndex: 0, totalSteps: 5, hasHistory: false, hasDueReminder: false, availableTools: ['scales'], currentDate: '2026-05-29', pendingScale: { taskId: 't1', sessionId: 's1', scaleId: 'SRS-22' } };
          const p = buildSystemPrompt(ctx);
          if (!p.includes('SRS-22')) throw new Error('缺少量表信息');
        }],
      ];
      for (const [name, fn] of tests) await runTest(name, fn);
    };

    window.runPerformanceTests = async function() {
      clearResults();
      log('⚡ 运行性能基准测试...');
      const tests = [
        ['风险评分1000次', () => {
          const a = { age: 13, family_scoliosis: '有' };
          const s = performance.now();
          for (let i = 0; i < 1000; i++) calculateRiskScore(a);
          const d = performance.now() - s;
          log(`  耗时: ${d.toFixed(2)}ms`, 'info');
          if (d > 1000) throw new Error('性能不达标');
        }],
        ['提示词100次', () => {
          const ctx = { patientName: '测试', patientAge: 12, patientGender: '女', phase: 'screening', stepIndex: 0, totalSteps: 5, hasHistory: false, hasDueReminder: false, availableTools: ['vision3'], currentDate: '2026-05-29' };
          const s = performance.now();
          for (let i = 0; i < 100; i++) buildSystemPrompt(ctx);
          const d = performance.now() - s;
          log(`  耗时: ${d.toFixed(2)}ms`, 'info');
          if (d > 2000) throw new Error('性能不达标');
        }],
      ];
      for (const [name, fn] of tests) await runTest(name, fn);
    };

    window.clearResults = function() {
      currentResults = [];
      document.getElementById('testResults').innerHTML = '';
      document.getElementById('logOutput').innerHTML = '<div class="log-info">等待测试开始...</div>';
      document.getElementById('passCount').textContent = '0';
      document.getElementById('failCount').textContent = '0';
      document.getElementById('totalTests').textContent = '0';
      document.getElementById('totalTime').textContent = '0ms';
      document.getElementById('progressBar').style.width = '0%';
    };

    // 场景模拟器
    window.switchScenario = function(scenario) {
      document.querySelectorAll('.scenario-tab').forEach(t => t.classList.remove('active'));
      event.target.classList.add('active');

      const container = document.getElementById('chatContainer');
      container.innerHTML = '';

      const scenarios = {
        newUser: [
          { role: 'bot', text: '你好！我是小柱 🧒，儿童脊柱健康小助手\n花大约 2 分钟，帮您了解一下孩子的脊柱侧弯风险。\n准备好了吗？' },
          { role: 'user', text: '开始检查' },
          { role: 'bot', text: '先告诉我孩子的名字或小名吧。' },
          { role: 'user', text: '小明' },
          { role: 'bot', text: '孩子的性别是？' },
          { role: 'user', text: '男孩' },
          { role: 'bot', text: '孩子今年的年龄是？（脊柱侧弯在 10-16 岁最高发，早发现早干预）' },
          { role: 'user', text: '12' },
        ],
        returning: [
          { role: 'bot', text: '欢迎回来！真高兴又见到您和宝贝。\n宝贝最近长高了吗？' },
          { role: 'user', text: '长高了不少' },
          { role: 'bot', text: '那咱们今天再来花两分钟复查一下，看看宝贝的小树苗长得正不正？' },
          { role: 'user', text: '好的' },
        ],
        highRisk: [
          { role: 'bot', text: '根据咱们刚才录入的信息和分析，宝贝的脊柱确实亮起了"小黄灯" ⚠️' },
          { role: 'user', text: '严重吗？' },
          { role: 'bot', text: '小柱非常建议咱们给孩子预约一次专业康复科或脊柱科的医生号。' },
          { role: 'bot', text: '🚨 强烈建议尽快到骨科或脊柱专科就诊，别耽误！' },
        ],
        scale: [
          { role: 'bot', text: '爸妈请留步哦 🧒！小柱刚刚收到了一条特别来信...' },
          { role: 'bot', text: '主治康复师特别为宝贝下发了一份专属的"宝贝心情与生活晴雨表" 📊（SRS-22）' },
          { role: 'user', text: '好的，我这就填写' },
          { role: 'bot', text: '太棒了！您只需要点击下方的小卡片，花一分钟和宝贝一起勾选填报就可以啦。' },
        ],
      };

      const msgs = scenarios[scenario] || [];
      msgs.forEach((msg, i) => {
        setTimeout(() => {
          const div = document.createElement('div');
          div.className = `chat-bubble ${msg.role}`;
          div.textContent = msg.text;
          container.appendChild(div);
          container.scrollTop = container.scrollHeight;
        }, i * 500);
      });
    };

    // 初始化
    log('🎯 压力测试页面已加载', 'success');
    log('点击"运行全部测试"开始全面压力测试', 'info');
  </script>
